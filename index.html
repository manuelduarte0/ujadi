<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujadi Quiz v600</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
  // 1. CONECTAR FIREBASE - SUAS CHAVES
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBi3v_bjeJuE4TBCFYeXcmRHF4EYZR8BaY",
    authDomain: "ujadi-quiz.firebaseapp.com",
    projectId: "ujadi-quiz",
    storageBucket: "ujadi-quiz.firebasestorage.app",
    messagingSenderId: "457117013086",
    appId: "1:457117013086:web:be773f7315519b48bad0cf",
    measurementId: "G-ZXGZ8Q24JC"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 2. PERGUNTAS DO QUIZ
  const perguntas = [
    {pergunta: "Qual a capital de Angola?", opcoes: ["Luanda", "Benguela", "Huambo", "Lobito"], resposta: 0},
    {pergunta: "2 + 2 =?", opcoes: ["3", "4", "5", "22"], resposta: 1},
    {pergunta: "Qual cor da bandeira de Angola?", opcoes: ["Verde e Amarela", "Vermelha e Preta", "Azul e Branca", "Roxa"], resposta: 1}
  ];

  let atual = 0;
  let pontos = 0;

  // 3. FUNÇÕES
  window.iniciarQuiz = () => {
    atual = 0; pontos = 0;
    document.getElementById('tela-inicio').classList.add('hidden');
    document.getElementById('tela-quiz').classList.remove('hidden');
    mostrarPergunta();
  }

  function mostrarPergunta() {
    const p = perguntas[atual];
    document.getElementById('pergunta').innerText = p.pergunta;
    const opcoesDiv = document.getElementById('opcoes');
    opcoesDiv.innerHTML = '';
    p.opcoes.forEach((op, i) => {
      opcoesDiv.innerHTML += `<button onclick="responder(${i})" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded mb-2">${op}</button>`;
    });
  }

  window.responder = (i) => {
    if(i === perguntas[atual].resposta) pontos += 10;
    atual++;
    if(atual < perguntas.length) mostrarPergunta();
    else fimJogo();
  }

  async function fimJogo() {
    document.getElementById('tela-quiz').classList.add('hidden');
    document.getElementById('tela-fim').classList.remove('hidden');
    document.getElementById('pontos-finais').innerText = pontos;
    await carregarRanking();
  }

  window.salvarPontos = async () => {
    const nome = document.getElementById('input-nome').value || "Anônimo";
    await addDoc(collection(db, "ranking"), {nome: nome, pontos: pontos, data: new Date()});
    alert("Pontuação salva!");
    carregarRanking();
  }

  async function carregarRanking() {
    const q = query(collection(db, "ranking"), orderBy("pontos", "desc"), limit(10));
    const snapshot = await getDocs(q);
    let html = '';
    snapshot.forEach((doc, i) => {
      const d = doc.data();
      html += `<div class="flex justify-between bg-gray-800 p-2 rounded mb-1"><span>${i+1}. ${d.nome}</span><span>${d.pontos} pts</span></div>`;
    });
    document.getElementById('ranking').innerHTML = html || "Seja o primeiro!";
  }

  carregarRanking();
</script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
<div class="w-full max-w-md p-4">

  <h1 class="text-center text-4xl font-bold mb-4">UJADI QUIZ</h1>

  <div id="tela-inicio">
    <button onclick="iniciarQuiz()" class="w-full bg-green-600 p-4 rounded text-xl">Começar</button>
    <h2 class="mt-6 text-2xl">Top 10 Ranking</h2>
    <div id="ranking" class="mt-2"></div>
  </div>

  <div id="tela-quiz" class="hidden">
    <p id="pergunta" class="text-2xl mb-4"></p>
    <div id="opcoes"></div>
  </div>

  <div id="tela-fim" class="hidden">
    <h2 class="text-3xl">Fim de Jogo!</h2>
    <p class="text-xl">Você fez: <span id="pontos-finais"></span> pontos</p>
    <input id="input-nome" placeholder="Digite seu nome" class="w-full p-2 mt-2 rounded text-black">
    <button onclick="salvarPontos()" class="w-full bg-blue-600 p-2 mt-2 rounded">Salvar no Ranking</button>
    <button onclick="location.reload()" class="w-full bg-gray-600 p-2 mt-2 rounded">Jogar de Novo</button>
  </div>

</div>
</body>
</html>

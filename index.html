<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UJADI v619 - Quiz com Pódio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:10px;min-height:100vh}
.card{background:white;border-radius:15px;padding:25px;max-width:650px;margin:0 auto;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
h2{text-align:center;margin-bottom:20px;color:#333}
.btn-grande{width:100%;padding:14px;margin:8px 0;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;transition:0.3s}
.btn-grande:hover{transform:scale(1.02)}
.btn-verde{background:#28a745;color:white}
.btn-cinza{background:#6c757d;color:white}
.btn-vermelho{background:#dc3545;color:white}
.btn-azul{background:#007bff;color:white}
.btn-opcao{width:100%;padding:12px;margin:6px 0;border:2px solid #ddd;background:white;border-radius:8px;text-align:left;font-size:15px;cursor:pointer;transition:0.2s}
.btn-opcao:hover{background:#f8f9fa;border-color:#007bff}
.btn-opcao.correta{background:#d4edda;border-color:#28a745}
.btn-opcao.errada{background:#f8d7da;border-color:#dc3545}
input[type="text"],input[type="password"],textarea{width:100%;padding:10px;margin:5px 0;border:2px solid #ddd;border-radius:5px;font-size:15px}
.ranking-item{display:flex;justify-content:space-between;padding:12px;border-bottom:1px solid #eee;font-size:15px}
.ranking-item:nth-child(1){background:#fff3cd;font-weight:bold}

/* PÓDIO TOP 3 */
.podio{display:flex;justify-content:center;align-items:flex-end;gap:12px;margin:25px 0 30px 0;padding:10px}
.podio-item{text-align:center;width:32%}
.podio-coluna{border-radius:10px 10px 0 0;padding:12px 5px;color:white;font-weight:bold;box-shadow:0 4px 8px rgba(0,0,0,0.2)}
.podio-1{height:130px;background:linear-gradient(180deg,#FFD700,#FFA500);order:2}
.podio-2{height:100px;background:linear-gradient(180deg,#C0C0C0,#A9A9A9);order:1}
.podio-3{height:80px;background:linear-gradient(180deg,#CD7F32,#A0522D);order:3}
.podio-nome{font-size:14px;font-weight:600;margin-top:10px;color:#333;word-break:break-word;min-height:40px}
.podio-pontos{font-size:12px;color:#666;font-weight:bold}
.medalha{font-size:28px;margin-bottom:5px}

#tela-quiz,#tela-admin,#tela-ranking{display:none}
.pergunta{font-size:18px;font-weight:bold;margin:15px 0;color:#333}
.progresso{height:8px;background:#e0e0e0;border-radius:10px;margin:15px 0;overflow:hidden}
.progresso-bar{height:100%;background:#28a745;width:0%;transition:0.3s}
.admin-login{display:none}
.admin-painel{display:none}
.referencia{font-size:12px;color:#666;font-style:italic;margin-top:10px}
</style>
</head>
<body>
<div class="card">

    <div id="tela-inicial">
        <h2>📖 UJADI Quiz Bíblico</h2>
        <p style="text-align:center;margin-bottom:20px;color:#666">Teste seus conhecimentos!</p>
        <button class="btn-grande btn-verde" id="btn-iniciar">Iniciar Quiz</button>
        <button class="btn-grande btn-cinza" id="btn-admin">Área do Administrador</button>
        <button class="btn-grande btn-azul" id="btn-ranking">🏆 Ver Ranking</button>
    </div>

    <div id="tela-quiz">
        <div class="progresso"><div class="progresso-bar" id="progresso-bar"></div></div>
        <p style="text-align:center">Pergunta <span id="num-pergunta">1</span> de <span id="total-perguntas">3</span></p>
        <div class="pergunta" id="texto-pergunta"></div>
        <div id="opcoes"></div>
        <p class="referencia" id="referencia"></p>
        <button class="btn-grande btn-azul" id="btn-proxima" style="display:none">Próxima Pergunta</button>
    </div>

    <div id="tela-fim" style="display:none">
        <h2>🎉 Quiz Finalizado!</h2>
        <p style="text-align:center;font-size:20px;margin:20px 0">Acertos: <span id="acertos-final">0</span>/<span id="total-final">0</span></p>
        <input type="text" id="nome-jogador" placeholder="Digite seu nome para o ranking">
        <button class="btn-grande btn-verde" id="btn-salvar-ranking">Salvar no Ranking</button>
        <button class="btn-grande btn-cinza" id="btn-voltar-inicio">Voltar ao Início</button>
    </div>

    <div id="tela-admin">
        <h2>🔒 Área do Administrador</h2>
        <div class="admin-login" id="admin-login">
            <input type="password" id="senha-admin" placeholder="Digite a senha">
            <button class="btn-grande btn-azul" id="btn-entrar-admin">Entrar</button>
            <button class="btn-grande btn-cinza" id="btn-voltar-admin1">Voltar</button>
        </div>
        <div class="admin-painel" id="admin-painel">
            <h3>Adicionar Nova Pergunta</h3>
            <textarea id="nova-pergunta" rows="2" placeholder="Pergunta"></textarea>
            <input type="text" id="opA" placeholder="Opção A">
            <input type="text" id="opB" placeholder="Opção B">
            <input type="text" id="opC" placeholder="Opção C">
            <input type="text" id="opD" placeholder="Opção D">
            <input type="text" id="resp-correta" placeholder="Resposta Correta: A, B, C ou D">
            <input type="text" id="referencia-biblica" placeholder="Referência Bíblica">
            <button class="btn-grande btn-verde" id="btn-add-pergunta">Adicionar Pergunta</button>
            <button class="btn-grande btn-vermelho" id="btn-reset-padrao">Resetar para Padrão</button>
            <button class="btn-grande btn-cinza" id="btn-voltar-admin2">Voltar</button>
        </div>
    </div>

    <div id="tela-ranking">
        <h2>🏆 Ranking Geral</h2>

        <div class="podio" id="podio-top3">
            <div class="podio-item">
                <div class="medalha">🥈</div>
                <div class="podio-coluna podio-2"><div>2º Lugar</div></div>
                <div class="podio-nome" id="nome-2">-</div>
                <div class="podio-pontos" id="pontos-2">-</div>
            </div>
            <div class="podio-item">
                <div class="medalha">🥇</div>
                <div class="podio-coluna podio-1"><div>1º Lugar</div></div>
                <div class="podio-nome" id="nome-1">-</div>
                <div class="podio-pontos" id="pontos-1">-</div>
            </div>
            <div class="podio-item">
                <div class="medalha">🥉</div>
                <div class="podio-coluna podio-3"><div>3º Lugar</div></div>
                <div class="podio-nome" id="nome-3">-</div>
                <div class="podio-pontos" id="pontos-3">-</div>
            </div>
        </div>

        <div id="lista-ranking"></div>

        <button class="btn-grande btn-cinza" id="btn-voltar-admin">Voltar</button>
        <button class="btn-grande btn-vermelho" id="btn-limpar">Zerar Ranking e Liberar Todos</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "seu-projeto.firebaseapp.com",
  databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com",
  projectId: "seu-projeto",
  storageBucket: "seu-projeto.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abc123"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let perguntas = [];
let perguntaAtual = 0;
let acertos = 0;
const SENHA_ADMIN = "4248";

const perguntasPadrao = [
    {p:"Quem negou Jesus 3 vezes?",a:["Pedro","Judas","Tomé","João"],r:"A",ref:"Lucas 22:54-62"},
    {p:"Com quantos anos Sara morreu?",a:["100 anos","110 anos","127 anos","140 anos"],r:"C",ref:"Gênesis 23:1"},
    {p:"Quem foi o homem mais velho da Bíblia?",a:["Noé","Abraão","Matusalém","Jacó"],r:"C",ref:"Gênesis 5:27"}
];

function carregarPerguntas(){
    const salvas = localStorage.getItem('perguntasUJADI');
    perguntas = salvas? JSON.parse(salvas) : perguntasPadrao;
    document.getElementById('total-perguntas').textContent = perguntas.length;
}

function salvarPerguntas(){
    localStorage.setItem('perguntasUJADI', JSON.stringify(perguntas));
}

function iniciarQuiz(){
    carregarPerguntas();
    perguntaAtual = 0;
    acertos = 0;
    document.getElementById('tela-inicial').style.display = 'none';
    document.getElementById('tela-quiz').style.display = 'block';
    mostrarPergunta();
}

function mostrarPergunta(){
    const p = perguntas[perguntaAtual];
    document.getElementById('num-pergunta').textContent = perguntaAtual + 1;
    document.getElementById('texto-pergunta').textContent = p.p;
    document.getElementById('referencia').textContent = "";
    document.getElementById('btn-proxima').style.display = 'none';

    const progresso = ((perguntaAtual)/perguntas.length)*100;
    document.getElementById('progresso-bar').style.width = progresso + '%';

    let html = '';
    p.a.forEach((opcao,i)=>{
        const letra = ['A','B','C','D'][i];
        html += `<button class="btn-opcao" onclick="responder('${letra}')">${letra}) ${opcao}</button>`;
    });
    document.getElementById('opcoes').innerHTML = html;
}

window.responder = function(letra){
    const p = perguntas[perguntaAtual];
    const botoes = document.querySelectorAll('.btn-opcao');
    botoes.forEach(btn=>{
        btn.disabled = true;
        if(btn.textContent.startsWith(p.r)){
            btn.classList.add('correta');
        }
    });

    if(letra === p.r){
        acertos++;
    } else {
        botoes.forEach(btn=>{
            if(btn.textContent.startsWith(letra)){
                btn.classList.add('errada');
            }
        });
    }

    document.getElementById('referencia').textContent = "Ref: " + p.ref;
    document.getElementById('btn-proxima').style.display = 'block';
}

document.getElementById('btn-proxima').onclick = function(){
    perguntaAtual++;
    if(perguntaAtual < perguntas.length){
        mostrarPergunta();
    } else {
        finalizarQuiz();
    }
}

function finalizarQuiz(){
    document.getElementById('tela-quiz').style.display = 'none';
    document.getElementById('tela-fim').style.display = 'block';
    document.getElementById('acertos-final').textContent = acertos;
    document.getElementById('total-final').textContent = perguntas.length;
}

async function salvarRanking(){
    const nome = document.getElementById('nome-jogador').value.trim();
    if(!nome) return alert("Digite seu nome!");

    await set(ref(db, 'ranking/' + nome), {
        nome: nome,
        acertos: acertos,
        total: perguntas.length,
        data: Date.now()
    });
    alert("Salvo no ranking!");
    voltarInicio();
}

async function carregarRankingDoFirebase(){
    const snapshot = await get(ref(db, 'ranking'));
    if(!snapshot.exists()) return [];
    const dados = snapshot.val();
    let lista = Object.values(dados);
    lista.sort((a,b)=> b.acertos - a.acertos || a.data - b.data);
    return lista;
}

function atualizarPodio(ranking){
    for(let i=1;i<=3;i++){
        document.getElementById(`nome-${i}`).textContent = '-';
        document.getElementById(`pontos-${i}`).textContent = '-';
    }
    if(ranking[0]){document.getElementById('nome-1').textContent=ranking[0].nome;document.getElementById('pontos-1').textContent=`${ranking[0].acertos}/${ranking[0].total}`;}
    if(ranking[1]){document.getElementById('nome-2').textContent=ranking[1].nome;document.getElementById('pontos-2').textContent=`${ranking[1].acertos}/${ranking[1].total}`;}
    if(ranking[2]){document.getElementById('nome-3').textContent=ranking[2].nome;document.getElementById('pontos-3').textContent=`${ranking[2].acertos}/${ranking[2].total}`;}
}

async function verRanking(){
    document.getElementById('tela-inicial').style.display='none';
    document.getElementById('tela-admin').style.display='none';
    document.getElementById('tela-ranking').style.display='block';
    let lista = document.getElementById('lista-ranking');
    lista.innerHTML = 'Carregando...';
    const ranking = await carregarRankingDoFirebase();
    atualizarPodio(ranking);
    if(ranking.length===0){lista.innerHTML='<p style="text-align:center">Nenhum jogador ainda</p>';return;}
    lista.innerHTML='';
    ranking.forEach((j,index)=>{
        lista.innerHTML+=`<div class="ranking-item"><span>${index+1}. ${j.nome}</span><span>${j.acertos}/${j.total}</span></div>`;
    });
}

async function limparRanking(){
    if(confirm("Tem certeza que deseja zerar o ranking?")){
        await remove(ref(db,'ranking'));
        verRanking();
    }
}

function abrirAdmin(){
    document.getElementById('tela-inicial').style.display='none';
    document.getElementById('tela-admin').style.display='block';
    document.getElementById('admin-login').style.display='block';
    document.getElementById('admin-painel').style.display='none';
}

function entrarAdmin(){
    const senha = document.getElementById('senha-admin').value;
    if(senha===SENHA_ADMIN){
        document.getElementById('admin-login').style.display='none';
        document.getElementById('admin-painel').style.display='block';
    } else {
        alert("Senha incorreta!");
    }
}

function adicionarPergunta(){
    const p = document.getElementById('nova-pergunta').value;
    const a = [document.getElementById('opA').value,document.getElementById('opB').value,document.getElementById('opC').value,document.getElementById('opD').value];
    const r = document.getElementById('resp-correta').value.toUpperCase();
    const ref = document.getElementById('referencia-biblica').value;

    if(!p || a.includes("") ||!r ||!ref) return alert("Preencha todos os campos!");

    perguntas.push({p:p,a:a,r:r,ref:ref});
    salvarPerguntas();
    alert("Pergunta adicionada!");
    document.getElementById('nova-pergunta').value="";
    document.getElementById('opA').value="";
    document.getElementById('opB').value="";
    document.getElementById('opC').value="";
    document.getElementById('opD').value="";
    document.getElementById('resp-correta').value="";
    document.getElementById('referencia-biblica').value="";
}

function resetarPadrao(){
    if(confirm("Deseja voltar para as 3 perguntas padrão?")){
        localStorage.removeItem('perguntasUJADI');
        carregarPerguntas();
        alert("Resetado!");
    }
}

function voltarInicio(){
    document.getElementById('tela-quiz').style.display='none';
    document.getElementById('tela-admin').style.display='none';
    document.getElementById('tela-ranking').style.display='none';
    document.getElementById('tela-fim').style.display='none';
    document.getElementById('tela-inicial').style.display='block';
}

document.getElementById('btn-iniciar').onclick=iniciarQuiz;
document.getElementById('btn-admin').onclick=abrirAdmin;
document.getElementById('btn-ranking').onclick=verRanking;
document.getElementById('btn-salvar-ranking').onclick=salvarRanking;
document.getElementById('btn-voltar-inicio').onclick=voltarInicio;
document.getElementById('btn-entrar-admin').onclick=entrarAdmin;
document.getElementById('btn-add-pergunta').onclick=adicionarPergunta;
document.getElementById('btn-reset-padrao').onclick=resetarPadrao;
document.getElementById('btn-limpar').onclick=limparRanking;
document.getElementById('btn-voltar-admin').onclick=voltarInicio;
document.getElementById('btn-voltar-admin1').onclick=voltarInicio;
document.getElementById('btn-voltar-admin2').onclick=voltarInicio;

carregarPerguntas();
</script>
</body>
</html>

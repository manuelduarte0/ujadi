<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UJADI v601</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module">
  // 1. FIREBASE
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBi3v_bjeJuE4TBCFYeXcmRHF4EYZR8BaY",
    authDomain: "ujadi-quiz.firebaseapp.com",
    projectId: "ujadi-quiz",
    storageBucket: "ujadi-quiz.firebasestorage.app",
    messagingSenderId: "457117013086",
    appId: "1:457117013086:web:be773f7315519b48bad0cf",
    measurementId: "G-ZXGZ8Q24JC"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 2. PERGUNTAS - Já deixei 10 pra ficar bom
  const perguntas = [
    {pergunta: "Qual a capital de Angola?", opcoes: ["Luanda", "Benguela", "Huambo", "Lobito"], resposta: 0},
    {pergunta: "Em que ano Angola se tornou independente?", opcoes: ["1974", "1975", "1980", "1990"], resposta: 1},
    {pergunta: "Qual o maior rio de Angola?", opcoes: ["Kwanza", "Zaire", "Cunene", "Dande"], resposta: 0},
    {pergunta: "2 + 2 x 2 =?", opcoes: ["6", "8", "4", "10"], resposta: 0},
    {pergunta: "Quem escreveu 'O Guarani'?", opcoes: ["Machado de Assis", "José de Alencar", "Carlos Drummond", "Graciliano Ramos"], resposta: 1},
    {pergunta: "Qual cor da bandeira de Angola?", opcoes: ["Verde e Amarela", "Vermelha e Preta", "Azul e Branca", "Roxa e Branca"], resposta: 1},
    {pergunta: "Quantos continentes existem?", opcoes: ["5", "6", "7", "8"], resposta: 2},
    {pergunta: "Qual a moeda de Angola?", opcoes: ["Real", "Kwanza", "Dólar", "Euro"], resposta: 1},
    {pergunta: "O que significa UJADI?", opcoes: ["União Juvenil", "União da Juventude", "União Jovem de Angola", "Você escolhe"], resposta: 1},
    {pergunta: "10% de 200 é?", opcoes: ["10", "20", "30", "40"], resposta: 1}
  ];

  let atual = 0;
  let pontos = 0;
  let nomeJogador = "";

  // 3. FUNÇÕES
  window.iniciarQuiz = async () => {
    nomeJogador = document.getElementById('input-nome').value.trim();
    if(nomeJogador === "") { alert("Digite seu nome completo!"); return; }

    if(localStorage.getItem("ujadi_jogou_" + nomeJogador)) {
      alert("Você já jogou 1 vez! Só pode jogar 1 vez.");
      return;
    }

    atual = 0; pontos = 0;
    document.getElementById('tela-inicio').classList.add('hidden');
    document.getElementById('tela-quiz').classList.remove('hidden');
    mostrarPergunta();
  }

  function mostrarPergunta() {
    const p = perguntas[atual];
    document.getElementById('pergunta').innerText = `${atual + 1}/${perguntas.length} - ${p.pergunta}`;
    const opcoesDiv = document.getElementById('opcoes');
    opcoesDiv.innerHTML = '';
    p.opcoes.forEach((op, i) => {
      opcoesDiv.innerHTML += `<button onclick="responder(${i})" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black font-bold p-3 rounded-lg mb-3">${op}</button>`;
    });
  }

  window.responder = (i) => {
    if(i === perguntas[atual].resposta) pontos += 10;
    atual++;
    if(atual < perguntas.length) mostrarPergunta();
    else fimJogo();
  }

  async function fimJogo() {
    document.getElementById('tela-quiz').classList.add('hidden');
    document.getElementById('tela-fim').classList.remove('hidden');
    document.getElementById('pontos-finais').innerText = pontos;
    localStorage.setItem("ujadi_jogou_" + nomeJogador, "true"); // Bloqueia 1 vez
    await salvarPontos();
  }

  async function salvarPontos() {
    await addDoc(collection(db, "ranking"), {nome: nomeJogador, pontos: pontos, data: new Date()});
    carregarRanking();
  }

  async function carregarRanking() {
    const q = query(collection(db, "ranking"), orderBy("pontos", "desc"), limit(10));
    const snapshot = await getDocs(q);
    let html = '';
    snapshot.forEach((doc, i) => {
      const d = doc.data();
      html += `<div class="flex justify-between bg-gray-200 text-black p-2 rounded mb-1"><span>${i+1}. ${d.nome}</span><span class="font-bold">${d.pontos} pts</span></div>`;
    });
    document.getElementById('ranking').innerHTML = html || "Seja o primeiro!";
  }

  carregarRanking();
</script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
<div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6">

  <h1 class="text-center text-4xl font-extrabold mb-4" style="color: #FFD700; text-shadow: 2px 2px 4px rgba(0,0,0,0.2);">UJADI</h1>

  <div id="tela-inicio">
    <div class="bg-yellow-100 border-l-4 border-yellow-500 text-yellow-700 p-3 rounded mb-4 text-center">
      ⚠️ Você só pode jogar 1 vez! Ao clicar em começar já fica bloqueado.
    </div>

    <input id="input-nome" placeholder="Digite seu nome completo" class="w-full p-3 border rounded-lg mb-4 text-black">

    <button onclick="iniciarQuiz()" class="w-full bg-green-600 hover:bg-green-700 text-white p-4 rounded-lg text-xl font-bold">📖 Começar Quiz</button>

    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-lg text-lg font-bold mt-3">
      Área do Administrador<br><span class="text-sm font-normal">MANUEL DUARTE</span>
    </button>

    <h2 class="mt-6 text-2xl font-bold text-black">Top 10 Ranking</h2>
    <div id="ranking" class="mt-2"></div>

    <p class="text-center text-gray-400 text-xs mt-6">fundador Manuel Duarte</p>
  </div>

  <div id="tela-quiz" class="hidden">
    <p id="pergunta" class="text-xl font-bold mb-4 text-black"></p>
    <div id="opcoes"></div>
  </div>

  <div id="tela-fim" class="hidden text-center">
    <h2 class="text-3xl font-bold text-black">Fim de Jogo!</h2>
    <p class="text-2xl text-black">Você fez: <span id="pontos-finais" class="font-extrabold text-green-600"></span> pontos</p>
    <button onclick="location.reload()" class="w-full bg-gray-600 p-3 mt-4 rounded-lg text-white font-bold">Jogar de Novo</button>
  </div>

</div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UJADI v619</title>
    <style>
        /*... todo o CSS antigo continua aqui... */

      .podio {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin: 20px 0 30px 0;
            padding: 10px;
        }

      .podio-item {
            text-align: center;
            width: 30%;
        }

      .podio-coluna {
            border-radius: 8px 8px 0 0;
            padding: 10px 5px;
            color: white;
            font-weight: bold;
        }

      .podio-1 {
            height: 120px;
            background: linear-gradient(180deg, #FFD700, #FFA500);
            order: 2;
        }
      .podio-2 {
            height: 90px;
            background: linear-gradient(180deg, #C0C0C0, #A9A9A9);
            order: 1;
        }
      .podio-3 {
            height: 70px;
            background: linear-gradient(180deg, #CD7F32, #A0522D);
            order: 3;
        }

      .podio-nome {
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            color: #333;
            word-break: break-word;
        }

      .podio-pontos {
            font-size: 11px;
            color: #666;
        }

      .medalha {
            font-size: 24px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!--... todas as telas antigas continuam iguais... -->

        <!-- TELA RANKING -->
        <div id="tela-ranking">
            <h2>🏆 Ranking Geral</h2>

            <!-- NOVO PÓDIO TOP 3 -->
            <div class="podio" id="podio-top3">
                <div class="podio-item">
                    <div class="medalha">🥈</div>
                    <div class="podio-coluna podio-2">
                        <div>2º</div>
                    </div>
                    <div class="podio-nome" id="nome-2">-</div>
                    <div class="podio-pontos" id="pontos-2">-</div>
                </div>
                <div class="podio-item">
                    <div class="medalha">🥇</div>
                    <div class="podio-coluna podio-1">
                        <div>1º</div>
                    </div>
                    <div class="podio-nome" id="nome-1">-</div>
                    <div class="podio-pontos" id="pontos-1">-</div>
                </div>
                <div class="podio-item">
                    <div class="medalha">🥉</div>
                    <div class="podio-coluna podio-3">
                        <div>3º</div>
                    </div>
                    <div class="podio-nome" id="nome-3">-</div>
                    <div class="podio-pontos" id="pontos-3">-</div>
                </div>
            </div>

            <!-- LISTA COMPLETA CONTINUA NORMAL -->
            <div id="lista-ranking"></div>

            <button class="btn-grande btn-cinza" id="btn-voltar-admin">Voltar</button>
            <button class="btn-grande btn-vermelho" id="btn-limpar">Zerar Ranking e Liberar Todos</button>
        </div>

        <!--... resto do código... -->
    </div>

<script type="module">
    //... todo o JS antigo continua aqui...

    async function verRanking() {
        document.getElementById('tela-admin').style.display = 'none';
        document.getElementById('tela-ranking').style.display = 'block';
        let lista = document.getElementById('lista-ranking');
        lista.innerHTML = 'Carregando...';
        const ranking = await carregarRankingDoFirebase();

        // ATUALIZA O PÓDIO TOP 3
        atualizarPodio(ranking);

        if(ranking.length === 0) {
            lista.innerHTML = '<p style="text-align:center">Nenhum jogador ainda</p>';
            return;
        }
        lista.innerHTML = '';
        ranking.forEach((j, index) => {
            lista.innerHTML += `<div class="ranking-item"><span>${index+1}. ${j.nome}</span><span>${j.acertos}/${j.total}</span></div>`;
        });
    }

    function atualizarPodio(ranking) {
        // Limpa primeiro
        for(let i = 1; i <= 3; i++) {
            document.getElementById(`nome-${i}`).textContent = '-';
            document.getElementById(`pontos-${i}`).textContent = '-';
        }

        // Preenche com quem tiver
        if(ranking[0]) {
            document.getElementById('nome-1').textContent = ranking[0].nome;
            document.getElementById('pontos-1').textContent = `${ranking[0].acertos}/${ranking[0].total}`;
        }
        if(ranking[1]) {
            document.getElementById('nome-2').textContent = ranking[1].nome;
            document.getElementById('pontos-2').textContent = `${ranking[1].acertos}/${ranking[1].total}`;
        }
        if(ranking[2]) {
            document.getElementById('nome-3').textContent = ranking[2].nome;
            document.getElementById('pontos-3').textContent = `${ranking[2].acertos}/${ranking[2].total}`;
        }
    }

    //... resto do JS continua igual...
</script>
</body>
</html>
